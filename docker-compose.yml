services:

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_data
      - audit_logs:/app/logs
    env_file: .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - LOG_DIR=/app/logs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - pipeline

  ui:
    build:
      context: .
      dockerfile: services/ui/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - pipeline

volumes:
  chroma_data:
  audit_logs:

networks:
  pipeline:
    driver: bridge
